version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: app-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: app-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URI: mongodb://mongodb:27017/myapp
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: app-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data: